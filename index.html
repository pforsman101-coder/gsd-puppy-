<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSD Puppy Finder Dashboard</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="border-b border-gray-800 pb-6 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-amber-500 tracking-tight">GSD Locator</h1>
                <p class="text-sm text-gray-400 mt-1">Target: Female, Purebred, &lt; 1 Year Old (Within 300mi of 07724)</p>
            </div>
            <span class="bg-emerald-950 text-emerald-400 border border-emerald-800 text-xs px-3 py-1.5 rounded-full font-semibold">
                ● Live Scraper Loop Active
            </span>
        </header>

        <div id="matches-grid" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
            <div id="loading" class="col-span-full text-center text-gray-500 py-12">
                Retrieving active database matches...
            </div>
        </div>
    </div>

    <script>
        async function fetchMatches() {
            const grid = document.getElementById('matches-grid');
            try {
                const response = await fetch('./listings.json');
                if (!response.ok) throw new Error("No matches database found yet.");
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12">No puppies found yet. Scraper is still checking regional networks...</div>`;
                    return;
                }

                grid.innerHTML = data.map(dog => `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-lg p-6 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-xl font-bold text-white">${dog.name}</h3>
                                <span class="bg-amber-500/10 text-amber-400 text-xs px-2.5 py-1 rounded border border-amber-500/20 font-medium">
                                    Puppy
                                </span>
                            </div>
                            <p class="text-sm text-gray-400 mb-1">📍 Region: <span class="text-gray-200">${dog.location}</span></p>
                            <p class="text-xs text-gray-500 mb-6">Found: ${dog.time_found || 'Recently'}</p>
                        </div>
                        <a href="${dog.link}" target="_blank" class="block text-center w-full bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-2.5 px-4 rounded-lg transition-colors text-sm">
                            View Rescue Profile →
                        </a>
                    </div>
                `).join('');

            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12">Waiting for first automated match cycle to write files. Check your mobile notifications!</div>`;
            }
        }
        fetchMatches();
    </script>
</body>
</html>
